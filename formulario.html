<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Registro de Sala</title>
  <link rel="stylesheet" href="./formulario.css">

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
  <div class="form-container">
    <h2>Registro de Sala</h2>
    <form id="salaForm">
      <label for="curso">Curso:</label>
      <input type="text" id="curso" name="curso" required>

      <label for="periodoInicio">Período:</label>
      <div class="date-range">
        <input type="date" id="periodoInicio" name="periodoInicio" required>
        <input type="date" id="periodoFim" name="periodoFim" required>
      </div>

      <label for="professor">Professor:</label>
      <input type="text" id="professor" name="professor" required>

      <label for="sala">Sala:</label>
      <input type="text" id="sala" name="sala" required>

      <button type="submit">Registrar Sala</button>
    </form>
    <div id="resultado" class="resultado"></div>
  </div>

  <script src="./formulario.js"></script>
</body>
</html>
